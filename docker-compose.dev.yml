# =============================================================================
# Docling Studio — Development stack
#
# Usage:
#   docker compose -f docker-compose.dev.yml up
#
# Includes OpenSearch single-node + Dashboards for search/sync features.
# Frontend runs Vite dev server with HMR, backend runs with --reload.
# =============================================================================

services:
  # --- Neo4j (graph-native document structure) ---
  neo4j:
    image: neo4j:5.15-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u $${NEO4J_USER:-neo4j} -p $${NEO4J_PASSWORD:-changeme} 'RETURN 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --- OpenSearch (single-node, security disabled for local dev) ---
  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- OpenSearch Dashboards (index inspection UI) ---
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  # --- Embedding service (sentence-transformers) ---
  embedding:
    build:
      context: ./embedding-service
    ports:
      - "8001:8001"
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-64}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2g

  # --- Backend (FastAPI with hot-reload) ---
  document-parser:
    build:
      context: ./document-parser
      target: ${CONVERSION_MODE:-local}
    ports:
      # 8000 is the vLLM OpenAI-compatible server (qwen3-vl).
      # 8001 is the embedding service. Expose the FastAPI app on 8002;
      # the in-network alias `document-parser:8000` still works for the
      # frontend.
      - "8002:8000"
    volumes:
      - ./document-parser:/app
      - uploads_data:/app/uploads
      - db_data:/app/data
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      DOCLING_SERVE_URL: ${DOCLING_SERVE_URL:-}
      DOCLING_SERVE_API_KEY: ${DOCLING_SERVE_API_KEY:-}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-100}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}
      BATCH_PAGE_SIZE: ${BATCH_PAGE_SIZE:-5}
      CONVERSION_TIMEOUT: ${CONVERSION_TIMEOUT:-3600}
      OPENSEARCH_URL: http://opensearch:9200
      EMBEDDING_URL: http://embedding:8001
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      # Fernet sealing-at-rest for store credentials (#279). See .env.example
      # for the one-liner to generate a key. No default on purpose: a dev
      # who creates a sealed store must persist the key in their own .env.
      STORE_SECRET_KEY: ${STORE_SECRET_KEY:-}
      # Docling model artifacts — baked into the image at build time by
      # the `docling-model-baker` stage in document-parser/Dockerfile.
      # The env var below tells Docling where to find them at runtime; the
      # image never needs to reach the network to convert a document.
      DOCLING_ARTIFACTS_PATH: ${DOCLING_ARTIFACTS_PATH:-/opt/docling/models}
      # Document Q&A chat via Ollama (running on host)
      CHAT_ENABLED: ${CHAT_ENABLED:-true}
      CHAT_MODEL_ID: ${CHAT_MODEL_ID:-gemma4:e4b-it-qat}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      # vLLM / OpenAI-compatible backend (qwen3-vl:8b-instruct on :8000).
      # When CHAT_PROVIDER=openai the chat endpoint talks to the vLLM
      # OpenAI-compat server instead of Ollama. The VLM path uses
      # VLM_OPENAI_URL when set, falling back to {OLLAMA_HOST}/v1.
      #
      # In production, the client provides their own vLLM server; override
      # OPENAI_BASE_URL + VLM_OPENAI_URL via `.env` to point at it. The
      # shipped dev defaults point at the `vllm` service in this compose
      # file via host.docker.internal:8000.
      CHAT_PROVIDER: ${CHAT_PROVIDER:-openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:8000/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      VLM_OPENAI_URL: ${VLM_OPENAI_URL:-http://host.docker.internal:8000/v1/chat/completions}
      # VLM backend settings
      VLM_BACKEND: ${VLM_BACKEND:-ollama}
      VLM_FALLBACK_MODEL: ${VLM_FALLBACK_MODEL:-GRANITEDOCLING_TRANSFORMERS}
      VLM_OLLAMA_MODEL: ${VLM_OLLAMA_MODEL:-qwen3-vl:8b-instruct}
      # v1 (2026-06-13) — synced with api/chat._SYSTEM_PROMPT so the
      # deep-extract merge gets clean output from BOTH the VLM-direct
      # path AND the Ask-on-markdown path. Single-line because the
      # compose default can't carry newlines. Override via the
      # VLM_OLLAMA_PROMPT env var in `.env` if you need to.
      VLM_OLLAMA_PROMPT: "${VLM_OLLAMA_PROMPT:-You are a trade-shipping document analyst reading a page image. Output a single JSON object (NOT an array, NOT wrapped in code fences) with these exact key prefixes and a numeric suffix starting at 1: - \"Company Name<n>\" = the legal/registered name of a company, bank, agency, broker, or organization that appears in the page. Include SHIPPER, CONSIGNEE, NOTIFY PARTY, CARRIER, ISSUING BANK, INSURER, AGENT, AGENCY - every company mentioned. - \"Address<n>\" = a postal or physical address. Multi-line addresses get one Address<n> with single-space-joined lines. Map each address to the most relevant Company when possible (Shipper's address with the Shipper, Consignee's address with the Consignee, etc.). Don't list the same address twice for the same company. - \"Shipping Information<n>\" = routing and transport details. For each leg/segment, include ALL of: \"From: <port/airport/code>\", \"To: <port/airport/code>\", \"Via: <vessel/flight name & number>\" (include vessel name when present, even partial), and \"Date: <shipped-on-board date>\" when present. Combine one leg's details into ONE Shipping Information<n> value, not separate keys. If a value is unknown for a leg, omit that field for that leg, not the whole key. - \"Goods Description<n>\" = the product name only. NO quantities (e.g. \"250 BAGS\", \"20.000 CBM\", \"399 BAGS\"). NO codes (HS codes, FDA registration, FDA N, contract numbers, lot numbers, FLO ID, container numbers, seal numbers). NO logos, certifications, or organization names. NO weight or measurement. If a sentence like \"250 BAGS OF 69 KILOGRAMS NET EACH OF WASHED GREEN COFFEE PERUVIAN ALTURA EURO PREPARATION (E.P.) OCIA CERTIFIED CROP 2007\" appears, output ONLY \"WASHED GREEN COFFEE PERUVIAN ALTURA EURO PREPARATION (E.P.)\" (or the closest product-name phrase). One goods description per distinct product. Rules: Output ONLY the JSON object. No markdown, no code fences, no preamble, no commentary. Every value MUST be a plain string (no arrays, no nested objects). Include every distinct company, address, shipping leg, and product. Do not deduplicate within a section. If a section has no entries, omit its keys entirely. Replace newlines inside values with a single space. Normalize whitespace: collapse multiple spaces to one. IMPORTANT: Do not stop early. Continue listing keys until you have captured every distinct entity in the document. CRITICAL: Preserve the exact spelling and wording from the document. Do NOT correct OCR artefacts, typos, or unusual spellings. If the page reads Wilhelminakade, output Wilhelminakade - NOT the proper-Dutch Wilhelmijnakade. If a name appears as DUPONT CHEMICAL (all caps) in the source, keep it all caps. The downstream merge may show multiple spelling variants side by side; the user's downstream validation uses the document's wording as ground truth, so a corrected value would be wrong.}"
      VLM_OLLAMA_MAX_TOKENS: ${VLM_OLLAMA_MAX_TOKENS:-131072}
      VLM_REMOTE_TIMEOUT: ${VLM_REMOTE_TIMEOUT:-3600}
      VLM_IMAGE_SCALE: ${VLM_IMAGE_SCALE:-2.0}
    command:
      ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      opensearch:
        condition: service_healthy
      embedding:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      vllm:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4g

  # --- Frontend (Vite dev server with HMR) ---
  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_APP_VERSION: dev
      VITE_API_PROXY_TARGET: http://document-parser:8000
    command: ["sh", "-c", "npm install && npm run dev -- --host"]
    depends_on:
      - document-parser

  # --- vLLM (single model, both Ask + VLM) -----------------------------------
  # The vllm/vllm-openai image defaults its entrypoint to `vllm serve`; we
  # pass the model + serving args via `command`. The HF cache bind-mount
  # keeps the model warm across container restarts (no redownload).
  #
  # VRAM math (16 GB RTX 5060 Ti):
  #   8B AWQ ≈ 7.4 GB, KV cache for 24 k context ≈ 4–5 GB, total ≈ 13.8 GB
  #   at gpu_memory_utilization=0.92. 32 k context was OOM at 0.85 — keep
  #   the 24 k/0.92 pair unless you also bump the GPU.
  #
  # Port :8000 is bound on the host because that's the URL the .env points
  # at (`http://host.docker.internal:8000/v1`). The document-parser reaches
  # it via Docker's host.docker.internal DNS bridge.
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    restart: unless-stopped
    ports:
      - "8000:8000"
    ipc: host
    volumes:
      # Bind-mount the host's HF cache so the model stays downloaded.
      # Override HF_CACHE_PATH in your shell to point elsewhere.
      - ${HF_CACHE_PATH:-${USERPROFILE}/.cache/huggingface}:/root/.cache/huggingface
    command:
      - --model=cyankiwi/Qwen3-VL-8B-Instruct-AWQ-4bit
      - --served-model-name=qwen3-vl:8b-instruct
      - --max-model-len=24576
      - --gpu-memory-utilization=0.92
      - --limit-mm-per-prompt={"image":1}
      - --dtype=auto
    healthcheck:
      # vLLM /v1/chat/completions with one max_token=1 ping — exercises the
      # full engine (tokenize + decode) so this turns green only after the
      # model is actually loaded and warmed up.
      test:
        - CMD-SHELL
        - 'curl -sf http://localhost:8000/v1/chat/completions -H ''Content-Type: application/json'' -d ''{"model":"qwen3-vl:8b-instruct","messages":[{"role":"user","content":"ping"}],"max_tokens":1}'''
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 300s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  opensearch_data:
  neo4j_data:
  neo4j_logs:
  uploads_data:
  db_data:
  frontend_node_modules:
