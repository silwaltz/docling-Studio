# =============================================================================
# Docling Studio — local development / quick-start compose.
#
# DEV DEFAULTS — NOT PRODUCTION-READY.
# This file ships sensible defaults for `docker compose up` to "just work" on
# a developer laptop. It is NOT a production deployment template:
#   - Neo4j boots with `NEO4J_PASSWORD=changeme` if the env var is unset.
#   - OpenSearch runs single-node with `DISABLE_SECURITY_PLUGIN=true`
#     (no TLS, no auth). Fine for local indexing experiments, never for
#     anything reachable from outside `localhost`.
#   - No HTTPS termination, no reverse-proxy hardening, no rate limit on
#     the embedding/OpenSearch services, ports bound to all interfaces.
#
# Operators running their own Docling Studio instance MUST:
#   1. Override `NEO4J_PASSWORD` (and rotate it) — see `.env.example`.
#   2. Re-enable the OpenSearch security plugin and configure TLS/users —
#      see https://opensearch.org/docs/latest/security/.
#   3. Bind sensitive services to internal networks only, terminate TLS at
#      a reverse proxy, and align CORS_ORIGINS / RATE_LIMIT_RPM with the
#      deployment surface.
#
# The audit pipeline expects this file to flag the dev defaults as such —
# don't silently strengthen them here without also updating the dev DX.
# =============================================================================

services:
  # --- Neo4j (graph-native document structure) ---
  # Dev-only auth: NEO4J_PASSWORD defaults to "changeme". Override in
  # `.env` (or any orchestrator secret store) before exposing this stack.
  neo4j:
    profiles: ["ingestion"]
    image: neo4j:5.15-community
    stop_grace_period: 60s
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u $${NEO4J_USER:-neo4j} -p $${NEO4J_PASSWORD:-changeme} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --- OpenSearch (single-node, security DISABLED — DEV ONLY) ---
  # `DISABLE_SECURITY_PLUGIN: "true"` removes auth, TLS, and audit logging.
  # This is fine for a local dev cluster bound to 127.0.0.1; it is NOT safe
  # for anything reachable from another host. For production, drop this
  # var, switch to a hardened image, and configure users + TLS:
  # https://opensearch.org/docs/latest/security/configuration/
  opensearch:
    profiles: ["ingestion"]
    image: opensearchproject/opensearch:2
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Embedding service (sentence-transformers) ---
  embedding:
    profiles: ["ingestion"]
    build:
      context: ./embedding-service
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-64}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2g

  # --- Backend (FastAPI) ---
  document-parser:
    build:
      context: ./document-parser
      target: ${CONVERSION_MODE:-local}
    expose:
      - "8000"
    volumes:
      - uploads_data:/app/uploads
      - db_data:/app/data
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      DOCLING_SERVE_URL: ${DOCLING_SERVE_URL:-}
      DOCLING_SERVE_API_KEY: ${DOCLING_SERVE_API_KEY:-}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-100}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}
      BATCH_PAGE_SIZE: ${BATCH_PAGE_SIZE:-10}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-}
      EMBEDDING_URL: ${EMBEDDING_URL:-}
      NEO4J_URI: ${NEO4J_URI:-}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      # Fernet sealing-at-rest for store credentials (#279). No default —
      # boot fails if sealed rows exist without this set. Generate with:
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # MUST stay stable across restarts.
      STORE_SECRET_KEY: ${STORE_SECRET_KEY:-}
      # Surface flags (#257). Default-off in production; the e2e UI suite
      # opts in via STUDIO_MODE_ENABLED=true to exercise the legacy /studio
      # tests until they're rewritten against /docs/:id (0.7.0).
      STUDIO_MODE_ENABLED: ${STUDIO_MODE_ENABLED:-false}
      RAG_PIPELINE_ENABLED: ${RAG_PIPELINE_ENABLED:-true}
      # Document Q&A chat via Ollama
      CHAT_ENABLED: ${CHAT_ENABLED:-true}
      CHAT_MODEL_ID: ${CHAT_MODEL_ID:-gemma4:e4b}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      # VLM backend settings
      VLM_BACKEND: ${VLM_BACKEND:-ollama}
      VLM_FALLBACK_MODEL: ${VLM_FALLBACK_MODEL:-GRANITEDOCLING_TRANSFORMERS}
      VLM_OLLAMA_MODEL: ${VLM_OLLAMA_MODEL:-qwen3-vl:8b}
      # v1 (2026-06-13) — synced with api/chat._SYSTEM_PROMPT so the
      # deep-extract merge gets clean output from BOTH the VLM-direct
      # path AND the Ask-on-markdown path. Single-line because the
      # compose default can't carry newlines. Override via the
      # VLM_OLLAMA_PROMPT env var in `.env` if you need to.
      VLM_OLLAMA_PROMPT: '${VLM_OLLAMA_PROMPT:-You are a trade-shipping document analyst reading a page image. Output a single JSON object (NOT an array, NOT wrapped in code fences) with these exact key prefixes and a numeric suffix starting at 1: - "Company Name<n>" = the legal/registered name of a company, bank, agency, broker, or organization that appears in the page. Include SHIPPER, CONSIGNEE, NOTIFY PARTY, CARRIER, ISSUING BANK, INSURER, AGENT, AGENCY - every company mentioned. - "Address<n>" = a postal or physical address. Multi-line addresses get one Address<n> with single-space-joined lines. Map each address to the most relevant Company when possible (Shipper's address with the Shipper, Consignee's address with the Consignee, etc.). Don't list the same address twice for the same company. - "Shipping Information<n>" = routing and transport details. For each leg/segment, include ALL of: "From: <port/airport/code>", "To: <port/airport/code>", "Via: <vessel/flight name & number>" (include vessel name when present, even partial), and "Date: <shipped-on-board date>" when present. Combine one leg's details into ONE Shipping Information<n> value, not separate keys. If a value is unknown for a leg, omit that field for that leg, not the whole key. - "Goods Description<n>" = the product name only. NO quantities (e.g. "250 BAGS", "20.000 CBM", "399 BAGS"). NO codes (HS codes, FDA registration, FDA N, contract numbers, lot numbers, FLO ID, container numbers, seal numbers). NO logos, certifications, or organization names. NO weight or measurement. If a sentence like "250 BAGS OF 69 KILOGRAMS NET EACH OF WASHED GREEN COFFEE PERUVIAN ALTURA EURO PREPARATION (E.P.) OCIA CERTIFIED CROP 2007" appears, output ONLY "WASHED GREEN COFFEE PERUVIAN ALTURA EURO PREPARATION (E.P.)" (or the closest product-name phrase). One goods description per distinct product. Rules: Output ONLY the JSON object. No markdown, no code fences, no preamble, no commentary. Every value MUST be a plain string (no arrays, no nested objects). Include every distinct company, address, shipping leg, and product. Do not deduplicate within a section. If a section has no entries, omit its keys entirely. Replace newlines inside values with a single space. Normalize whitespace: collapse multiple spaces to one. IMPORTANT: Do not stop early. Continue listing keys until you have captured every distinct entity in the document.}'
      VLM_OLLAMA_MAX_TOKENS: ${VLM_OLLAMA_MAX_TOKENS:-131072}
      VLM_REMOTE_TIMEOUT: ${VLM_REMOTE_TIMEOUT:-3600}
      VLM_IMAGE_SCALE: ${VLM_IMAGE_SCALE:-2.0}
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # --- Frontend (nginx) ---
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    environment:
      NGINX_MAX_BODY_SIZE: ${NGINX_MAX_BODY_SIZE:-200M}
    depends_on:
      - document-parser

volumes:
  opensearch_data:
  neo4j_data:
  neo4j_logs:
  uploads_data:
  db_data:
