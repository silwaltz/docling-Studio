# docker-compose.yml - single-container vLLM stack
#
# Single-model setup: Qwen3-VL-8B-Instruct-AWQ-4bit serves BOTH the docling-studio
# Ask pipeline (text chat) and the VLM pipeline (page-image extraction) from one
# OpenAI-compatible HTTP endpoint on host port 8000.
#
# Usage:
#   docker compose pull            # one-time: pulls the vLLM image
#   docker compose up -d           # start vLLM
#   docker compose logs -f vllm    # tail logs (wait for "Application startup complete")
#   docker compose ps              # check status (healthcheck waits for model load)
#   docker compose down            # stop
#
# Environment vars come from .env in the same directory (generated by install-vllm-rhel.sh).

services:
  # -----------------------------------------------------------------------
  # vLLM - Qwen3-VL-8B-Instruct-AWQ-4bit (single model, Ask + VLM)
  #
  # VRAM math (16 GB RTX 5060 Ti reference):
  #   8B AWQ ≈ 7.4 GB weights, KV cache for 24 k context ≈ 4-5 GB,
  #   total ≈ 13.8 GB at gpu_memory_utilization=0.92.
  #   32 k context was OOM at 0.85 utilization - keep the 24 k / 0.92 pair
  #   unless you also bump the GPU.
  #
  # Port :8000 is bound on the host because that's the URL the project's
  # .env points at (OPENAI_BASE_URL=http://host.docker.internal:8000/v1
  # when co-located; http://<vllm-host>:8000/v1 when split across hosts).
  # -----------------------------------------------------------------------
  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    container_name: vllm
    restart: unless-stopped
    # Modern GPU access (nvidia-container-toolkit). The single container pins
    # to one GPU; bump count: 2 (and add tensor_parallel_size=2) if you have
    # the headroom and want to spread the model across multiple cards.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # --ipc=host is critical for tensor parallel (shared memory for PyTorch).
    # shm_size is the alternative if your container runtime doesn't allow host IPC.
    shm_size: '8gb'
    environment:
      HF_TOKEN: ${HF_TOKEN:-}                  # set in .env if the model is gated
      HF_HOME: /root/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface/hub
      TRANSFORMERS_CACHE: /root/.cache/huggingface/hub
      # Enable if host driver is older than R555. Harmless otherwise.
      VLLM_ENABLE_CUDA_COMPATIBILITY: ${VLLM_ENABLE_CUDA_COMPATIBILITY:-0}
    volumes:
      # Bind-mount the host's HF cache so the model stays downloaded across
      # container restarts. Override HF_CACHE_DIR in .env to relocate.
      - ${HF_CACHE_DIR:-/var/lib/vllm/hf-cache}:/root/.cache/huggingface
    ports:
      - "${VLLM_PORT:-8000}:8000"
    command:
      - --model=${VLLM_HF_MODEL:-cyankiwi/Qwen3-VL-8B-Instruct-AWQ-4bit}
      - --served-model-name=${VLLM_MODEL_TAG:-qwen3-vl:8b-instruct}
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=${VLLM_MAX_MODEL_LEN:-24576}
      - --gpu-memory-utilization=${VLLM_GPU_MEM_UTIL:-0.92}
      - --limit-mm-per-prompt={"image":1}
      - --dtype=auto
    healthcheck:
      # vLLM /v1/chat/completions with max_tokens=1 ping - exercises the
      # full engine (tokenize + decode) so this turns green only after the
      # model is actually loaded and warmed up.
      test:
        - CMD-SHELL
        - 'curl -sf http://localhost:8000/v1/chat/completions -H ''Content-Type: application/json'' -d ''{"model":"${VLLM_MODEL_TAG:-qwen3-vl:8b-instruct}","messages":[{"role":"user","content":"ping"}],"max_tokens":1}'''
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 300s              # model load + CUDA-graph capture